        <form action="https://formspree.io/f/mbdzakze" method="POST" id="contact-form">
            <div class="form-group">
                <label for="email">Your Email:</label>
                <input type="email" name="email" id="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea name="message" id="message" required placeholder="How can we collaborate?"></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Inquiry</button>
        </form>

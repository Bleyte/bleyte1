
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lotto-machine">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <h1>Lotto Number Generator</h1>
        <div class="number-display"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="contact-form-container">
        <h2>Affiliate Inquiry</h2>
        <form action="https://formspree.io/f/mbdzakze" method="POST" id="contact-form">
            <div class="form-group">
                <label for="email">Your Email:</label>
                <input type="email" name="email" id="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea name="message" id="message" required placeholder="How can we collaborate?"></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Inquiry</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
